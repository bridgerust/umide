name: Release

on:
  push:
    tags:
      - "v[0-9]*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag (for example: v0.1.0)"
        required: true
  pull_request:
    paths:
      - ".github/workflows/release.yml"
      - "extra/**"
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse

jobs:
  meta:
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.meta.outputs.tag_name }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
    steps:
      - id: meta
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            TAG_NAME="${GITHUB_REF_NAME}"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG_NAME="${{ github.event.inputs.tag_name }}"
          else
            TAG_NAME="dry-run-${GITHUB_SHA::7}"
          fi

          if [[ -z "${TAG_NAME}" ]]; then
            echo "tag_name input is required for workflow_dispatch"
            exit 1
          fi

          PRERELEASE=false
          if [[ "${TAG_NAME}" == *-* ]]; then
            PRERELEASE=true
          fi

          echo "tag_name=${TAG_NAME}" | tee -a "$GITHUB_OUTPUT"
          echo "prerelease=${PRERELEASE}" | tee -a "$GITHUB_OUTPUT"

  linux:
    name: Build Linux
    runs-on: ubuntu-latest
    needs: meta
    steps:
      - uses: actions/checkout@v6

      - name: Set up protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Linux build dependencies
        run: sudo make ubuntu-deps

      - name: Update toolchain
        run: rustup update --no-self-update

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build binaries
        run: cargo build --profile release-lto --locked --bin umide --bin umide-proxy

      - name: Package artifacts
        shell: bash
        run: |
          cp ./target/release-lto/umide ./umide-linux-x86_64
          cp ./target/release-lto/umide-proxy ./umide-proxy-linux-x86_64
          tar -czf ./umide-linux-x86_64.tar.gz ./umide-linux-x86_64
          gzip -c ./umide-proxy-linux-x86_64 > ./umide-proxy-linux-x86_64.gz

      - uses: actions/upload-artifact@v7
        with:
          name: release-linux
          path: |
            ./umide-linux-x86_64.tar.gz
            ./umide-proxy-linux-x86_64.gz
          retention-days: 7

  windows:
    name: Build Windows
    runs-on: windows-latest
    needs: meta
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v6

      - name: Set up protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update toolchain
        run: rustup update --no-self-update

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build binaries
        run: cargo build --profile release-lto --locked --bin umide --bin umide-proxy

      - name: Package artifacts
        run: |
          Compress-Archive -Path .\target\release-lto\umide.exe -DestinationPath .\umide-windows-x86_64.zip -Force

          $source = Join-Path $PWD '.\target\release-lto\umide-proxy.exe'
          $target = Join-Path $PWD '.\umide-proxy-windows-x86_64.gz'
          $inStream = [System.IO.File]::OpenRead($source)
          $outStream = [System.IO.File]::Create($target)
          $gzipStream = New-Object System.IO.Compression.GzipStream($outStream, [System.IO.Compression.CompressionLevel]::Optimal)
          $inStream.CopyTo($gzipStream)
          $gzipStream.Dispose()
          $inStream.Dispose()
          $outStream.Dispose()

      - uses: actions/upload-artifact@v7
        with:
          name: release-windows
          path: |
            ./umide-windows-x86_64.zip
            ./umide-proxy-windows-x86_64.gz
          retention-days: 7

  macos:
    name: Build macOS
    runs-on: macos-14
    needs: meta
    env:
      APPLE_DEVELOPER_ID_APPLICATION_CERT_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_CERT_BASE64 }}
      APPLE_DEVELOPER_ID_APPLICATION_CERT_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_CERT_PASSWORD }}
      APPLE_DEVELOPER_ID_APPLICATION_IDENTITY: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_IDENTITY }}
      APPLE_NOTARY_APPLE_ID: ${{ secrets.APPLE_NOTARY_APPLE_ID }}
      APPLE_NOTARY_APP_PASSWORD: ${{ secrets.APPLE_NOTARY_APP_PASSWORD }}
      APPLE_NOTARY_TEAM_ID: ${{ secrets.APPLE_NOTARY_TEAM_ID }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update toolchain and install targets
        run: |
          rustup update --no-self-update
          rustup target add x86_64-apple-darwin aarch64-apple-darwin

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Validate macOS signing secrets
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          missing=()
          for var in \
            APPLE_DEVELOPER_ID_APPLICATION_CERT_BASE64 \
            APPLE_DEVELOPER_ID_APPLICATION_CERT_PASSWORD \
            APPLE_DEVELOPER_ID_APPLICATION_IDENTITY \
            APPLE_NOTARY_APPLE_ID \
            APPLE_NOTARY_APP_PASSWORD \
            APPLE_NOTARY_TEAM_ID
          do
            if [[ -z "${!var}" ]]; then
              missing+=("${var}")
            fi
          done

          if (( ${#missing[@]} > 0 )); then
            printf 'Missing required macOS release secrets:\n' >&2
            printf '  - %s\n' "${missing[@]}" >&2
            exit 1
          fi

      - name: Import Developer ID certificate
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          KEYCHAIN_PATH="${RUNNER_TEMP}/build.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"
          CERT_PATH="${RUNNER_TEMP}/developer-id.p12"

          printf '%s' "${APPLE_DEVELOPER_ID_APPLICATION_CERT_BASE64}" | base64 -D > "${CERT_PATH}"

          security create-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security set-keychain-settings -lut 21600 "${KEYCHAIN_PATH}"
          security unlock-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security import "${CERT_PATH}" \
            -k "${KEYCHAIN_PATH}" \
            -P "${APPLE_DEVELOPER_ID_APPLICATION_CERT_PASSWORD}" \
            -T /usr/bin/codesign \
            -T /usr/bin/security \
            -T /usr/bin/xcrun
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "${KEYCHAIN_PASSWORD}" \
            "${KEYCHAIN_PATH}"
          security list-keychains -d user -s "${KEYCHAIN_PATH}" login.keychain-db
          security find-identity -v -p codesigning "${KEYCHAIN_PATH}"

      - name: Build binaries
        run: |
          cargo build --profile release-lto --locked --target x86_64-apple-darwin --bin umide --bin umide-proxy
          cargo build --profile release-lto --locked --target aarch64-apple-darwin --bin umide --bin umide-proxy

      - name: Package app bundle and DMG
        shell: bash
        run: |
          bash ./extra/macos/package_app.sh
        env:
          APP_NAME: UMIDE
          BUNDLE_VERSION: ${{ github.run_number }}
          UMIDE_X64: ./target/x86_64-apple-darwin/release-lto/umide
          UMIDE_ARM64: ./target/aarch64-apple-darwin/release-lto/umide
          PROXY_X64: ./target/x86_64-apple-darwin/release-lto/umide-proxy
          PROXY_ARM64: ./target/aarch64-apple-darwin/release-lto/umide-proxy

      - name: Notarize and staple DMG
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          xcrun notarytool submit \
            ./dist/macos/UMIDE-macos.dmg \
            --apple-id "${APPLE_NOTARY_APPLE_ID}" \
            --password "${APPLE_NOTARY_APP_PASSWORD}" \
            --team-id "${APPLE_NOTARY_TEAM_ID}" \
            --wait

          xcrun stapler staple ./dist/macos/UMIDE-macos.dmg
          xcrun stapler validate ./dist/macos/UMIDE-macos.dmg
          spctl --assess --type open --context context:primary-signature --verbose ./dist/macos/UMIDE-macos.dmg

      - uses: actions/upload-artifact@v7
        with:
          name: release-macos
          path: |
            ./dist/macos/UMIDE-macos.dmg
          retention-days: 7

  publish:
    name: Publish GitHub Release
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs:
      - meta
      - macos
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TAG_NAME: ${{ needs.meta.outputs.tag_name }}
      PRERELEASE: ${{ needs.meta.outputs.prerelease }}
    steps:
      - uses: actions/download-artifact@v8

      - name: Create or update release
        shell: bash
        run: |
          if gh release view "${TAG_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${TAG_NAME}" \
              --repo "${GITHUB_REPOSITORY}" \
              ./release-linux/* \
              ./release-windows/* \
              ./release-macos/* \
              --clobber
            exit 0
          fi

          RELEASE_ARGS=()
          if [[ "${PRERELEASE}" == "true" ]]; then
            RELEASE_ARGS+=(--prerelease)
          fi

          gh release create "${TAG_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --target "${GITHUB_SHA}" \
            --title "${TAG_NAME}" \
            --generate-notes \
            "${RELEASE_ARGS[@]}" \
            ./release-linux/* \
            ./release-windows/* \
            ./release-macos/*
