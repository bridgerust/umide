name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag (for example: v1.0.0)"
        required: true
  pull_request:
    paths:
      - ".github/workflows/release.yml"

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
  FLOEM_REPOSITORY: https://github.com/lapce/floem
  FLOEM_REV: e0dd862564e3afbad5cba8ebe60df166a7a41e56

jobs:
  meta:
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.meta.outputs.tag_name }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
    steps:
      - id: meta
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            TAG_NAME="${GITHUB_REF_NAME}"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG_NAME="${{ github.event.inputs.tag_name }}"
          else
            TAG_NAME="dry-run-${GITHUB_SHA::7}"
          fi

          if [[ -z "${TAG_NAME}" ]]; then
            echo "tag_name input is required for workflow_dispatch"
            exit 1
          fi

          PRERELEASE=false
          if [[ "${TAG_NAME}" == *-* ]]; then
            PRERELEASE=true
          fi

          echo "tag_name=${TAG_NAME}" | tee -a "$GITHUB_OUTPUT"
          echo "prerelease=${PRERELEASE}" | tee -a "$GITHUB_OUTPUT"

  linux:
    name: Build Linux
    runs-on: ubuntu-latest
    needs: meta
    steps:
      - uses: actions/checkout@v4

      - name: Set up protoc
        uses: arduino/setup-protoc@v3

      - name: Install Linux build dependencies
        run: sudo make ubuntu-deps

      - name: Prepare floem dependency
        run: |
          rm -rf ../floem
          git clone "${FLOEM_REPOSITORY}" ../floem
          git -C ../floem checkout "${FLOEM_REV}"

      - name: Update toolchain
        run: rustup update --no-self-update

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build binaries
        run: cargo build --profile release-lto --bin umide --bin umide-proxy

      - name: Package artifacts
        shell: bash
        run: |
          cp ./target/release-lto/umide ./umide-linux-x86_64
          cp ./target/release-lto/umide-proxy ./umide-proxy-linux-x86_64
          tar -czf ./umide-linux-x86_64.tar.gz ./umide-linux-x86_64
          gzip -c ./umide-proxy-linux-x86_64 > ./umide-proxy-linux-x86_64.gz

      - uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: |
            ./umide-linux-x86_64.tar.gz
            ./umide-proxy-linux-x86_64.gz
          retention-days: 7

  windows:
    name: Build Windows
    runs-on: windows-latest
    needs: meta
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4

      - name: Set up protoc
        uses: arduino/setup-protoc@v3

      - name: Prepare floem dependency
        run: |
          if (Test-Path ../floem) { Remove-Item -Path ../floem -Recurse -Force }
          git clone "${env:FLOEM_REPOSITORY}" ../floem
          git -C ../floem checkout "${env:FLOEM_REV}"

      - name: Update toolchain
        run: rustup update --no-self-update

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build binaries
        run: cargo build --profile release-lto --bin umide --bin umide-proxy

      - name: Package artifacts
        run: |
          Compress-Archive -Path .\target\release-lto\umide.exe -DestinationPath .\umide-windows-x86_64.zip -Force

          $source = Join-Path $PWD '.\target\release-lto\umide-proxy.exe'
          $target = Join-Path $PWD '.\umide-proxy-windows-x86_64.gz'
          $inStream = [System.IO.File]::OpenRead($source)
          $outStream = [System.IO.File]::Create($target)
          $gzipStream = New-Object System.IO.Compression.GzipStream($outStream, [System.IO.Compression.CompressionLevel]::Optimal)
          $inStream.CopyTo($gzipStream)
          $gzipStream.Dispose()
          $inStream.Dispose()
          $outStream.Dispose()

      - uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: |
            ./umide-windows-x86_64.zip
            ./umide-proxy-windows-x86_64.gz
          retention-days: 7

  macos:
    name: Build macOS
    runs-on: macos-14
    needs: meta
    steps:
      - uses: actions/checkout@v4

      - name: Set up protoc
        uses: arduino/setup-protoc@v3

      - name: Prepare floem dependency
        shell: bash
        run: |
          rm -rf ../floem
          git clone "${FLOEM_REPOSITORY}" ../floem
          git -C ../floem checkout "${FLOEM_REV}"

      - name: Update toolchain and install targets
        run: |
          rustup update --no-self-update
          rustup target add x86_64-apple-darwin aarch64-apple-darwin

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build binaries
        run: |
          cargo build --profile release-lto --target x86_64-apple-darwin --bin umide --bin umide-proxy
          cargo build --profile release-lto --target aarch64-apple-darwin --bin umide --bin umide-proxy

      - name: Build universal artifacts
        shell: bash
        run: |
          lipo -create \
            ./target/x86_64-apple-darwin/release-lto/umide \
            ./target/aarch64-apple-darwin/release-lto/umide \
            -output ./umide-macos-universal

          lipo -create \
            ./target/x86_64-apple-darwin/release-lto/umide-proxy \
            ./target/aarch64-apple-darwin/release-lto/umide-proxy \
            -output ./umide-proxy-macos-universal

          tar -czf ./umide-macos-universal.tar.gz ./umide-macos-universal
          gzip -c ./umide-proxy-macos-universal > ./umide-proxy-macos-universal.gz

      - uses: actions/upload-artifact@v4
        with:
          name: release-macos
          path: |
            ./umide-macos-universal.tar.gz
            ./umide-proxy-macos-universal.gz
          retention-days: 7

  publish:
    name: Publish GitHub Release
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs:
      - meta
      - linux
      - windows
      - macos
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TAG_NAME: ${{ needs.meta.outputs.tag_name }}
      PRERELEASE: ${{ needs.meta.outputs.prerelease }}
    steps:
      - uses: actions/download-artifact@v4

      - name: Create or update release
        shell: bash
        run: |
          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            gh release upload "${TAG_NAME}" \
              ./release-linux/* \
              ./release-windows/* \
              ./release-macos/* \
              --clobber
            exit 0
          fi

          RELEASE_ARGS=()
          if [[ "${PRERELEASE}" == "true" ]]; then
            RELEASE_ARGS+=(--prerelease)
          fi

          gh release create "${TAG_NAME}" \
            --target "${GITHUB_SHA}" \
            --title "${TAG_NAME}" \
            --generate-notes \
            "${RELEASE_ARGS[@]}" \
            ./release-linux/* \
            ./release-windows/* \
            ./release-macos/*
