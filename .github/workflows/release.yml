name: Release

on:
  push:
    tags:
      - "v[0-9]*" # real release: always builds + publishes
    branches:
      - main # post-merge: builds to validate packaging (gated in `meta`)
  workflow_dispatch: # ⚠ PUBLISHES — signs + creates a GitHub Release for `tag_name`.
    inputs:
      tag_name:
        description: "Release tag (for example: v0.1.0)"
        required: true
  # NB: intentionally no `pull_request` trigger and no `paths:` on the push above.
  # A `paths` filter on `push` would also apply to tag pushes and could stop a
  # real release from building. Instead the (slow) build jobs are gated in the
  # `meta` job: tags + manual dispatch always build; a push to main builds only
  # when a packaging input (umide.spec, extra/**, release.yml, …) changed.
  # PR-time code/dependency correctness is covered by ci.yml on all three OSes.
  # To DRY-RUN packaging WITHOUT publishing, push a packaging-input change to
  # `main` (is_release=false → build only). `workflow_dispatch` is NOT a dry-run:
  # it sets is_release=true and the `publish` job runs on it, so it signs and
  # publishes a real Release (a `-`-suffixed tag_name becomes a prerelease).

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  # Cancel a superseded main-branch validation build when a newer push lands;
  # never cancel a tag release (each tag is its own concurrency group anyway).
  cancel-in-progress: ${{ github.ref == 'refs/heads/main' }}

env:
  CARGO_TERM_COLOR: always
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse

jobs:
  meta:
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.meta.outputs.tag_name }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
      should_build: ${{ steps.decide.outputs.should_build }}
      is_release: ${{ steps.decide.outputs.is_release }}
    steps:
      # A push to main only needs the slow release build when a packaging input
      # changed — diff the push to decide. Tags / manual dispatch always build.
      - uses: actions/checkout@v4
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          fetch-depth: 0
      - id: decide
        shell: bash
        run: |
          # A real release (a v* tag or a manual dispatch) always builds AND
          # signs/publishes. A push to main only *builds* — and only when a
          # packaging input changed — to validate packaging; it never signs or
          # publishes.
          if [[ "${{ github.event_name }}" == "workflow_dispatch" || "${{ github.ref_type }}" == "tag" ]]; then
            echo "is_release=true" | tee -a "$GITHUB_OUTPUT"
            echo "should_build=true" | tee -a "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "is_release=false" | tee -a "$GITHUB_OUTPUT"
          before="${{ github.event.before }}"
          if [[ -z "$before" || "$before" =~ ^0+$ ]]; then
            # No known base (new branch / first run) — build to be safe.
            echo "should_build=true" | tee -a "$GITHUB_OUTPUT"
            exit 0
          fi
          changed="$(git diff --name-only "$before" "${{ github.sha }}")"
          if grep -qE '^(\.github/workflows/release\.yml|extra/|umide\.spec|docker-bake\.hcl|Makefile)' <<<"$changed"; then
            echo "should_build=true" | tee -a "$GITHUB_OUTPUT"
          else
            echo "should_build=false" | tee -a "$GITHUB_OUTPUT"
          fi
      - id: meta
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            TAG_NAME="${GITHUB_REF_NAME}"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG_NAME="${{ github.event.inputs.tag_name }}"
          else
            TAG_NAME="dry-run-${GITHUB_SHA::7}"
          fi

          if [[ -z "${TAG_NAME}" ]]; then
            echo "tag_name input is required for workflow_dispatch"
            exit 1
          fi

          PRERELEASE=false
          if [[ "${TAG_NAME}" == *-* ]]; then
            PRERELEASE=true
          fi

          echo "tag_name=${TAG_NAME}" | tee -a "$GITHUB_OUTPUT"
          echo "prerelease=${PRERELEASE}" | tee -a "$GITHUB_OUTPUT"

  linux:
    name: Build Linux
    runs-on: ubuntu-latest
    needs: meta
    if: needs.meta.outputs.should_build == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Set up protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Linux build dependencies
        run: sudo make ubuntu-deps

      - name: Update toolchain
        run: rustup update --no-self-update

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build binaries
        run: cargo build --profile release-lto --locked --bin umide --bin umide-proxy

      - name: Package artifacts
        shell: bash
        run: |
          cp ./target/release-lto/umide ./umide-linux-x86_64
          cp ./target/release-lto/umide-proxy ./umide-proxy-linux-x86_64
          tar -czf ./umide-linux-x86_64.tar.gz ./umide-linux-x86_64
          gzip -c ./umide-proxy-linux-x86_64 > ./umide-proxy-linux-x86_64.gz

      - name: Build .deb package
        shell: bash
        run: |
          cargo install cargo-deb --locked
          cargo deb --no-build --profile release-lto -p umide --output ./umide-linux-x86_64.deb
          ls -lh ./umide-linux-x86_64.deb

      - uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: |
            ./umide-linux-x86_64.tar.gz
            ./umide-proxy-linux-x86_64.gz
            ./umide-linux-x86_64.deb
          retention-days: 7

  windows:
    name: Build Windows
    runs-on: windows-latest
    needs: meta
    if: needs.meta.outputs.should_build == 'true'
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4

      - name: Set up protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update toolchain
        run: rustup update --no-self-update

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build binaries
        run: cargo build --profile release-lto --locked --bin umide --bin umide-proxy

      - name: Package artifacts
        run: |
          Compress-Archive -Path .\target\release-lto\umide.exe -DestinationPath .\umide-windows-x86_64.zip -Force

          $source = Join-Path $PWD '.\target\release-lto\umide-proxy.exe'
          $target = Join-Path $PWD '.\umide-proxy-windows-x86_64.gz'
          $inStream = [System.IO.File]::OpenRead($source)
          $outStream = [System.IO.File]::Create($target)
          $gzipStream = New-Object System.IO.Compression.GzipStream($outStream, [System.IO.Compression.CompressionLevel]::Optimal)
          $inStream.CopyTo($gzipStream)
          $gzipStream.Dispose()
          $inStream.Dispose()
          $outStream.Dispose()

      - name: Build MSI installer
        run: |
          $wixBin = if ($env:WIX) { Join-Path $env:WIX 'bin' } else { '' }
          if (-not ($wixBin -and (Test-Path (Join-Path $wixBin 'candle.exe')))) {
            choco install wixtoolset --no-progress -y
            $wixBin = 'C:\Program Files (x86)\WiX Toolset v3.14\bin'
          }
          $ver = (Select-String -Path Cargo.toml -Pattern '^version\s*=\s*"([0-9][0-9.]*)"' | Select-Object -First 1).Matches.Groups[1].Value
          if (-not $ver) { $ver = '0.1.2' }
          Write-Host "Building MSI version $ver using WiX at $wixBin"
          $wxs = 'extra\windows\wix\umide.wxs'
          (Get-Content $wxs -Raw).Replace('Version="0.0.0"', 'Version="' + $ver + '"') | Set-Content $wxs
          & (Join-Path $wixBin 'candle.exe') -arch x64 -ext WixUtilExtension $wxs -o umide.wixobj
          & (Join-Path $wixBin 'light.exe') -ext WixUtilExtension -ext WixUIExtension umide.wixobj -o UMIDE-windows.msi
          Get-Item UMIDE-windows.msi

      - uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: |
            ./umide-windows-x86_64.zip
            ./umide-proxy-windows-x86_64.gz
            ./UMIDE-windows.msi
          retention-days: 7

  macos:
    name: Build macOS
    runs-on: macos-14
    needs: meta
    if: needs.meta.outputs.should_build == 'true'
    env:
      APPLE_DEVELOPER_ID_APPLICATION_CERT_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_CERT_BASE64 }}
      APPLE_DEVELOPER_ID_APPLICATION_CERT_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_CERT_PASSWORD }}
      APPLE_DEVELOPER_ID_APPLICATION_IDENTITY: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_IDENTITY }}
      APPLE_NOTARY_APPLE_ID: ${{ secrets.APPLE_NOTARY_APPLE_ID }}
      APPLE_NOTARY_APP_PASSWORD: ${{ secrets.APPLE_NOTARY_APP_PASSWORD }}
      APPLE_NOTARY_TEAM_ID: ${{ secrets.APPLE_NOTARY_TEAM_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update toolchain and install targets
        run: |
          rustup update --no-self-update
          rustup target add x86_64-apple-darwin aarch64-apple-darwin

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Validate macOS signing secrets
        if: needs.meta.outputs.is_release == 'true'
        shell: bash
        run: |
          missing=()
          for var in \
            APPLE_DEVELOPER_ID_APPLICATION_CERT_BASE64 \
            APPLE_DEVELOPER_ID_APPLICATION_CERT_PASSWORD \
            APPLE_DEVELOPER_ID_APPLICATION_IDENTITY \
            APPLE_NOTARY_APPLE_ID \
            APPLE_NOTARY_APP_PASSWORD \
            APPLE_NOTARY_TEAM_ID
          do
            if [[ -z "${!var}" ]]; then
              missing+=("${var}")
            fi
          done

          if (( ${#missing[@]} > 0 )); then
            printf 'Missing required macOS release secrets:\n' >&2
            printf '  - %s\n' "${missing[@]}" >&2
            exit 1
          fi

      - name: Import Developer ID certificate
        if: needs.meta.outputs.is_release == 'true'
        shell: bash
        run: |
          KEYCHAIN_PATH="${RUNNER_TEMP}/build.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"
          CERT_PATH="${RUNNER_TEMP}/developer-id.p12"

          printf '%s' "${APPLE_DEVELOPER_ID_APPLICATION_CERT_BASE64}" | base64 -D > "${CERT_PATH}"

          security create-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security set-keychain-settings -lut 21600 "${KEYCHAIN_PATH}"
          security unlock-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security import "${CERT_PATH}" \
            -k "${KEYCHAIN_PATH}" \
            -P "${APPLE_DEVELOPER_ID_APPLICATION_CERT_PASSWORD}" \
            -T /usr/bin/codesign \
            -T /usr/bin/security \
            -T /usr/bin/xcrun
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "${KEYCHAIN_PASSWORD}" \
            "${KEYCHAIN_PATH}"
          security list-keychains -d user -s "${KEYCHAIN_PATH}" login.keychain-db
          security find-identity -v -p codesigning "${KEYCHAIN_PATH}"

      - name: Build binaries
        run: |
          cargo build --profile release-lto --locked --target x86_64-apple-darwin --bin umide --bin umide-proxy
          cargo build --profile release-lto --locked --target aarch64-apple-darwin --bin umide --bin umide-proxy

      - name: Package app bundle and DMG
        shell: bash
        run: |
          bash ./extra/macos/package_app.sh
        env:
          APP_NAME: UMIDE
          BUNDLE_VERSION: ${{ github.run_number }}
          UMIDE_X64: ./target/x86_64-apple-darwin/release-lto/umide
          UMIDE_ARM64: ./target/aarch64-apple-darwin/release-lto/umide
          PROXY_X64: ./target/x86_64-apple-darwin/release-lto/umide-proxy
          PROXY_ARM64: ./target/aarch64-apple-darwin/release-lto/umide-proxy
          # On non-release builds (e.g. a main-push packaging check) the cert
          # isn't imported, so don't attempt signing (package_app.sh skips
          # codesign when this is empty).
          APPLE_DEVELOPER_ID_APPLICATION_IDENTITY: ${{ needs.meta.outputs.is_release == 'true' && secrets.APPLE_DEVELOPER_ID_APPLICATION_IDENTITY || '' }}

      - name: Notarize and staple DMG
        if: needs.meta.outputs.is_release == 'true'
        shell: bash
        run: |
          xcrun notarytool submit \
            ./dist/macos/UMIDE-macos.dmg \
            --apple-id "${APPLE_NOTARY_APPLE_ID}" \
            --password "${APPLE_NOTARY_APP_PASSWORD}" \
            --team-id "${APPLE_NOTARY_TEAM_ID}" \
            --wait

          xcrun stapler staple ./dist/macos/UMIDE-macos.dmg
          xcrun stapler validate ./dist/macos/UMIDE-macos.dmg
          spctl --assess --type open --context context:primary-signature --verbose ./dist/macos/UMIDE-macos.dmg

      - uses: actions/upload-artifact@v4
        with:
          name: release-macos
          path: |
            ./dist/macos/UMIDE-macos.dmg
          retention-days: 7

  publish:
    name: Publish GitHub Release
    # Only publish a real release on a v* tag (or a manual dispatch with a tag
    # name). A push to main may build (to validate packaging) but must NOT create
    # a release named "main".
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs:
      - meta
      - linux
      - windows
      - macos
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TAG_NAME: ${{ needs.meta.outputs.tag_name }}
      PRERELEASE: ${{ needs.meta.outputs.prerelease }}
    steps:
      - uses: actions/download-artifact@v4

      - name: Create or update release
        shell: bash
        run: |
          if gh release view "${TAG_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${TAG_NAME}" \
              --repo "${GITHUB_REPOSITORY}" \
              ./release-linux/* \
              ./release-windows/* \
              ./release-macos/* \
              --clobber
            exit 0
          fi

          RELEASE_ARGS=()
          if [[ "${PRERELEASE}" == "true" ]]; then
            RELEASE_ARGS+=(--prerelease)
          fi

          gh release create "${TAG_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --target "${GITHUB_SHA}" \
            --title "${TAG_NAME}" \
            --generate-notes \
            "${RELEASE_ARGS[@]}" \
            ./release-linux/* \
            ./release-windows/* \
            ./release-macos/*
