on:
  push:
    branches:
      - main
    paths:
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/ci.yml"
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

name: CI

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
  # CI runs on cold runners, so incremental only adds small-file I/O (costly on
  # NTFS) with no reuse; disable it. And skip debuginfo entirely — nothing here
  # runs under a debugger, and generating MSVC PDBs is a large, Windows-
  # disproportionate slice of every compile+link (debug_assertions stay on).
  CARGO_INCREMENTAL: "0"
  CARGO_PROFILE_DEV_DEBUG: "0"
  CARGO_PROFILE_TEST_DEBUG: "0"

jobs:
  build:
    name: Rust on ${{ matrix.os }}
    if: github.event.pull_request.draft == false
    needs: [fmt, clippy]
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies on Ubuntu
        if: startsWith(matrix.os, 'ubuntu')
        run: sudo make ubuntu-deps

      - name: Update toolchain
        run: rustup update --no-self-update

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Fetch dependencies
        run: cargo fetch --locked

      - name: Build
        run: cargo build --frozen

      # Run doc tests here — while `target/` is warm from the build above — so
      # they reuse the just-compiled dependency graph instead of recompiling it.
      # Previously this ran last, AFTER a Windows-only `cargo clean`, which wiped
      # the whole target dir and forced the doc-test step to rebuild the entire
      # ~977-crate workspace cold: ~570s on Windows vs ~4s elsewhere (the single
      # biggest cause of the Windows job being ~7x slower than Linux).
      - name: Run doc tests
        run: cargo test --doc --workspace

      # Run first-party unit tests (agent engine + editor glue). Linux-only: the
      # logic is OS-independent, the target is already warm from Build, so this is
      # cheap and keeps the Windows/macOS legs fast. A full `--workspace` test run
      # is avoided on purpose — a vendored crate ships a broken test — so this
      # names the crates whose `#[test]`s we actually own and must keep green.
      - name: Run unit tests
        if: startsWith(matrix.os, 'ubuntu')
        run: cargo test -p umide_agent -p umide-app --lib

      # Verify the Windows-only portable feature still compiles. Kept last so it
      # doesn't disturb the warm target the doc tests rely on. No `cargo clean`:
      # with debuginfo off (see env) peak disk stays below the previous
      # build+portable peak that already fit.
      - name: Build as portable
        if: startsWith(matrix.os, 'windows')
        run: cargo build --frozen --features umide-app/portable

  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update toolchain & add rustfmt
        run: |
          rustup update
          rustup component add rustfmt

      - name: Run rustfmt
        run: cargo fmt --all --check

  clippy:
    name: Clippy on ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update toolchain & add clippy
        run: |
          rustup update --no-self-update
          rustup component add clippy

      - name: Install dependencies on Ubuntu
        if: startsWith(matrix.os, 'ubuntu')
        run: sudo make ubuntu-deps

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Fetch dependencies
        run: cargo fetch --locked

      - name: Run clippy
        run: cargo clippy
